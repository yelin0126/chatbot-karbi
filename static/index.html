<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사내 AI 어시스턴트</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f6f8;
            --bg2: #ffffff;
            --bg3: #f0f1f3;
            --bgh: #e8eaed;
            --surface: #ffffff;
            --surface-soft: #fafbfd;
            --surface-hover: #fff5f5;
            --chat-bg-top: #f8fafc;
            --chat-bg-bottom: #f5f7fb;
            --assistant-bg: rgba(255, 255, 255, 0.84);
            --assistant-border: rgba(148, 163, 184, 0.26);
            --success-bg: #e7f7ef;
            --success-border: #b7e4c7;
            --success-text: #166534;
            --info-bg: #eef2ff;
            --info-border: #c7d2fe;
            --info-text: #4338ca;
            --file-banner-bg: #eef6ff;
            --file-banner-border: #bfdbfe;
            --file-banner-text: #1d4ed8;
            --accent: #2563eb;
            --accent2: #3b82f6;
            --tp: #1a1a2e;
            --ts: #64748b;
            --tm: #94a3b8;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --user-bg: rgba(37, 99, 235, 0.07);
            --user-border: #2563eb;
            --sw: 280px;
        }

        body[data-theme="dark"] {
            --bg: #09111f;
            --bg2: #111b2d;
            --bg3: #182437;
            --bgh: #22314a;
            --surface: #132032;
            --surface-soft: #101b2b;
            --surface-hover: #2b1821;
            --chat-bg-top: #0d1524;
            --chat-bg-bottom: #0a1120;
            --assistant-bg: rgba(19, 32, 50, 0.82);
            --assistant-border: rgba(96, 165, 250, 0.18);
            --success-bg: rgba(16, 185, 129, 0.13);
            --success-border: rgba(52, 211, 153, 0.24);
            --success-text: #86efac;
            --info-bg: rgba(96, 165, 250, 0.12);
            --info-border: rgba(96, 165, 250, 0.22);
            --info-text: #bfdbfe;
            --file-banner-bg: rgba(96, 165, 250, 0.12);
            --file-banner-border: rgba(96, 165, 250, 0.22);
            --file-banner-text: #bfdbfe;
            --accent: #60a5fa;
            --accent2: #3b82f6;
            --tp: #e2ebf8;
            --ts: #9fb0c9;
            --tm: #7386a3;
            --border: #24324c;
            --success: #34d399;
            --danger: #f87171;
            --user-bg: rgba(96, 165, 250, 0.12);
            --user-border: #60a5fa;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--tp);
            height: 100vh;
            overflow: hidden;
        }

        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .login-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            width: 400px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .login-logo span { font-size: 20px; font-weight: 700; color: var(--tp); }
        .login-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .login-card p { font-size: 14px; color: var(--ts); margin-bottom: 28px; }

        .fg { margin-bottom: 16px; }
        .fg label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--ts);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .fg input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--tp);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }

        .fg input:focus { border-color: var(--accent); }

        .login-btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
        }

        .login-btn:hover { background: var(--accent2); }
        .login-err { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; display: none; }

        #app { display: none; height: 100vh; flex-direction: row; }

        .sidebar {
            width: var(--sw);
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sb-header { padding: 16px; border-bottom: 1px solid var(--border); }

        .ws-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--tp);
            display: flex;
            align-items: center;
        }

        .us-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .sdot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; }
        .us-status span { font-size: 13px; color: var(--ts); }

        .sb-search { padding: 8px 10px; border-bottom: 1px solid var(--border); }

        .sb-search-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 10px;
        }

        .sb-search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: 12px;
            color: var(--tp);
            font-family: inherit;
        }

        .sb-sec { padding: 12px 8px 4px; }

        .sb-sec-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--tm);
            text-transform: uppercase;
            letter-spacing: .8px;
            padding: 0 8px;
            margin-bottom: 4px;
        }

        .sb-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background .15s;
            font-size: 13px;
            color: var(--ts);
        }

        .sb-item:hover { background: var(--bgh); color: var(--tp); }
        .sb-item.active { background: var(--accent); color: #fff; }
        .sb-item .ic { font-size: 14px; flex-shrink: 0; }
        .sb-item .chat-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .sb-item .del-btn {
            opacity: 0;
            font-size: 11px;
            padding: 2px 5px;
            border-radius: 3px;
            color: var(--tm);
            background: none;
            border: none;
            cursor: pointer;
        }

        .sb-item:hover .del-btn { opacity: 1; }
        .sb-item .del-btn:hover { color: var(--danger); }

        .new-btn {
            margin: 8px;
            padding: 8px 12px;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 6px;
            color: var(--tm);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all .2s;
        }

        .new-btn:hover { border-color: var(--accent); color: var(--accent); }
        .chat-list { max-height: 220px; overflow-y: auto; margin: 0 8px; }
        .chat-list::-webkit-scrollbar { width: 3px; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--border); }

        .shelf-wrap { padding: 0 8px 8px; }
        .shelf-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .shelf-tools { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
        .shelf-search {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 12px;
            color: var(--tp);
            font-family: inherit;
            outline: none;
        }
        .shelf-search:focus { border-color: var(--accent); }

        .shelf-upload-btn {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg3);
            color: var(--ts);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
        }

        .shelf-upload-btn:hover { border-color: var(--accent); color: var(--accent); }
        .shelf-upload-btn:disabled { opacity: .6; cursor: not-allowed; }

        .shelf-list {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-soft);
            padding: 6px;
        }

        .shelf-list::-webkit-scrollbar { width: 4px; }
        .shelf-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .shelf-empty { font-size: 12px; color: var(--tm); text-align: center; padding: 16px 8px; }

        .shelf-item {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 6px;
            transition: border-color .2s, background .2s, box-shadow .2s;
        }

        .shelf-item:last-child { margin-bottom: 0; }
        .shelf-item.active { border-color: var(--accent); background: rgba(37, 99, 235, 0.06); box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.08); }
        .shelf-item-top { display: flex; align-items: center; gap: 6px; }
        .shelf-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 7px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.10);
            color: var(--accent);
            font-size: 10px;
            font-weight: 700;
            margin-top: 6px;
        }

        .shelf-item-name {
            flex: 1;
            min-width: 0;
            background: none;
            border: none;
            text-align: left;
            font-size: 12px;
            color: var(--tp);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .shelf-item-name.active { color: var(--accent); }

        .shelf-del-btn {
            flex-shrink: 0;
            font-size: 11px;
            padding: 3px 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--tm);
            cursor: pointer;
            font-family: inherit;
        }

        .shelf-del-btn:hover { border-color: var(--danger); color: var(--danger); background: var(--surface-hover); }
        .shelf-item-meta { margin-top: 4px; font-size: 11px; color: var(--tm); }
        .shelf-item-time { margin-top: 5px; font-size: 10px; color: var(--tm); }

        .quick-menu { margin-top: auto; }
        .sb-footer { padding: 12px; border-top: 1px solid var(--border); }

        .user-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 6px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .ur-text { flex: 1; min-width: 0; }
        .ur-name { font-size: 14px; font-weight: 600; color: var(--tp); }
        .ur-role { font-size: 11px; color: var(--tm); }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--ts);
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            font-family: inherit;
            padding: 4px 8px;
            border-radius: 5px;
            white-space: nowrap;
        }

        .logout-btn:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            flex-shrink: 0;
        }

        .chat-header h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--tp);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .model-select {
            min-width: 180px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--tp);
            font-size: 12px;
            font-family: inherit;
            outline: none;
        }

        .model-select:focus { border-color: var(--accent); }

        .header-stat {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 9px;
            border-radius: 999px;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--ts);
            font-size: 11px;
            font-weight: 600;
        }

        .header-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
        }

        .hdr-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--ts);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }

        .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

        .theme-btn {
            min-width: 90px;
            justify-content: center;
        }

        .selection-tray {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(37, 99, 235, 0.04), rgba(37, 99, 235, 0.01));
        }

        .selection-tray.visible { display: flex; }
        .tray-label { font-size: 11px; font-weight: 700; color: var(--ts); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
        .tray-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; min-width: 0; }
        .tray-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            max-width: 260px;
            padding: 5px 10px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid rgba(37, 99, 235, 0.18);
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
        }
        .tray-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tray-chip button {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
        }
        .tray-clear {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--ts);
            cursor: pointer;
            font-size: 12px;
            padding: 6px 10px;
            white-space: nowrap;
        }
        .tray-clear:hover { border-color: var(--accent); color: var(--accent); }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            scroll-behavior: smooth;
            background:
                radial-gradient(circle at top right, rgba(37, 99, 235, 0.05), transparent 28%),
                linear-gradient(180deg, var(--chat-bg-top), var(--chat-bg-bottom));
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .msg-group { display: flex; flex-direction: column; margin-bottom: 14px; animation: msgIn .2s ease; }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
        .msg-sender { font-size: 14px; font-weight: 700; }
        .msg-sender.ai { color: var(--accent); }
        .msg-time { font-size: 11px; color: var(--tm); }

        .copy-btn {
            opacity: 0;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--ts);
            cursor: pointer;
            font-family: inherit;
        }

        .msg-group:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

        .msg-file {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            padding: 4px 9px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.18);
            color: var(--accent);
            font-size: 12px;
            font-weight: 600;
        }

        .msg-text {
            font-size: 14px;
            line-height: 1.65;
            color: var(--tp);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-text:not(.user) {
            background: var(--assistant-bg);
            border: 1px solid var(--assistant-border);
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: 0 10px 26px rgba(2, 6, 23, 0.04);
        }

        .msg-text.user {
            background: var(--user-bg);
            border-left: 3px solid var(--user-border);
            padding: 8px 12px;
            border-radius: 0 6px 6px 0;
        }

        .msg-foot {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .mode-pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 999px;
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
            font-size: 11px;
            font-weight: 700;
        }

        .src-tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 999px;
            background: var(--info-bg);
            border: 1px solid var(--info-border);
            color: var(--info-text);
            font-size: 11px;
        }

        .typing { display: flex; align-items: center; gap: 8px; color: var(--tm); font-size: 13px; padding: 4px 0; }
        .dots { display: flex; gap: 4px; }

        .dots span {
            width: 6px;
            height: 6px;
            background: var(--tm);
            border-radius: 50%;
            animation: bounce .8s infinite;
        }

        .dots span:nth-child(2) { animation-delay: .15s; }
        .dots span:nth-child(3) { animation-delay: .3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            gap: 10px;
        }

        .welcome .wi {
            width: 112px;
            height: auto;
            object-fit: contain;
            border-radius: 0;
            border: none;
            box-shadow: none;
            margin-bottom: 8px;
            background: transparent;
            display: block;
        }

        .welcome h2 { font-size: 22px; font-weight: 700; color: var(--tp); }
        .welcome p { font-size: 14px; color: var(--ts); max-width: 420px; line-height: 1.6; }
        .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }

        .qb {
            padding: 7px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--ts);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
        }

        .qb:hover { border-color: var(--accent); color: var(--accent); }

        .input-area { padding: 10px 20px 14px; background: var(--bg); flex-shrink: 0; }

        .scope-banner,
        .file-banner {
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
        }

        .scope-banner.visible,
        .file-banner.visible { display: flex; }

        .scope-banner {
            background: rgba(37, 99, 235, 0.07);
            border: 1px solid rgba(37, 99, 235, 0.22);
            color: var(--accent);
        }

        .file-banner {
            background: var(--file-banner-bg);
            border: 1px solid var(--file-banner-border);
            color: var(--file-banner-text);
        }

        .scope-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .04em;
            text-transform: uppercase;
            opacity: .75;
        }

        .scope-text,
        .file-text {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .banner-close {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
            padding: 0 2px;
        }

        .input-box {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            gap: 6px;
            padding: 8px 8px 8px 14px;
            transition: border-color .2s;
        }

        .input-box:focus-within { border-color: var(--accent); }

        #msg-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--tp);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 22px;
            line-height: 1.5;
            padding: 2px 0;
        }

        #msg-input::placeholder { color: var(--tm); }

        .send-btn,
        .stop-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: #fff;
        }

        .send-btn:hover { background: var(--accent2); }
        .send-btn:disabled { background: var(--border); cursor: not-allowed; }

        .stop-btn {
            background: #fee2e2;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .input-hint { font-size: 11px; color: var(--tm); margin-top: 5px; text-align: center; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13px;
            color: var(--tp);
            z-index: 300;
            opacity: 0;
            transform: translateY(8px);
            transition: all .3s;
            pointer-events: none;
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-bg.open { display: flex; }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            width: 500px;
            max-width: 90vw;
        }

        .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; color: var(--tp); }
        .modal p { font-size: 13px; color: var(--ts); margin-bottom: 16px; }

        .modal textarea {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            color: var(--tp);
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            outline: none;
            line-height: 1.5;
        }

        .modal textarea:focus { border-color: var(--accent); }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

        .mbtn {
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            border: none;
        }

        .mbtn.cancel { background: var(--bg3); color: var(--ts); border: 1px solid var(--border); }
        .mbtn.save { background: var(--accent); color: #fff; }

        /* Desktop-only UI: mobile layout is intentionally not optimized in this branch. */
    </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="modal-bg" id="sp-modal">
    <div class="modal">
        <h3>⚙️ 시스템 프롬프트 설정</h3>
        <p>AI의 역할과 응답 방식을 지정하세요.</p>
        <textarea id="sp-input" placeholder="예: 당신은 사내 법무팀 AI 어시스턴트입니다."></textarea>
        <div class="modal-btns">
            <button class="mbtn cancel" onclick="closeModal('sp-modal')">취소</button>
            <button class="mbtn save" onclick="savePrompt()">저장</button>
        </div>
    </div>
</div>

<div id="login-screen">
    <div class="login-card">
        <div class="login-logo">
            <svg width="28" height="28" viewBox="0 0 22 22" fill="none">
                <circle cx="6" cy="6" r="5" fill="#EF4444"/>
                <circle cx="16" cy="6" r="5" fill="#FBBF24"/>
                <circle cx="6" cy="16" r="5" fill="#22C55E"/>
                <circle cx="16" cy="16" r="5" fill="#3B82F6"/>
            </svg>
            <span>틸론 AI</span>
        </div>
        <h2>로그인</h2>
        <p>직원 계정으로 로그인하세요</p>
        <div class="fg"><label>아이디</label><input type="text" id="li-id" placeholder="아이디 입력" autocomplete="off"></div>
        <div class="fg"><label>비밀번호</label><input type="password" id="li-pw" placeholder="비밀번호 입력"></div>
        <button class="login-btn" onclick="doLogin()">로그인</button>
        <div class="login-err" id="li-err">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="sb-header">
            <div class="ws-name">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" style="margin-right:6px">
                    <circle cx="6" cy="6" r="5" fill="#EF4444"/>
                    <circle cx="16" cy="6" r="5" fill="#FBBF24"/>
                    <circle cx="6" cy="16" r="5" fill="#22C55E"/>
                    <circle cx="16" cy="16" r="5" fill="#3B82F6"/>
                </svg>
                틸론 AI
            </div>
            <div class="us-status"><div class="sdot"></div><span id="sb-user">직원</span></div>
        </div>

        <div class="sb-search">
            <div class="sb-search-box">
                <span>🔎</span>
                <input type="text" placeholder="채팅 검색..." oninput="filterChats(this.value)">
            </div>
        </div>

        <div class="sb-sec"><div class="sb-sec-title">채팅 목록</div></div>
        <button class="new-btn" onclick="newChat()">＋ 새 채팅</button>
        <div class="chat-list" id="chat-list"></div>

        <div class="sb-sec"><div class="sb-sec-title">업로드 파일 보관소</div></div>
        <div class="shelf-wrap">
            <div class="shelf-head">
                <button class="shelf-upload-btn" id="shelf-upload-btn" onclick="openShelfUpload()">📎 파일 업로드</button>
            </div>
            <div class="shelf-tools">
                <input class="shelf-search" id="shelf-search" type="text" placeholder="업로드 문서 검색...">
            </div>
            <div class="shelf-list" id="shelf-list">
                <div class="shelf-empty">업로드된 파일이 없습니다.</div>
            </div>
            <input type="file" id="shelf-file" accept=".pdf,.png,.jpg,.jpeg,.webp" multiple style="display:none" onchange="uploadToShelf(this)">
        </div>

        <div class="quick-menu">
            <div class="sb-sec">
                <div class="sb-sec-title">빠른 메뉴</div>
                <div class="sb-item" onclick="quickMsg('오늘 할 일 목록 정리해줘')"><span class="ic">✅</span> 업무 정리</div>
                <div class="sb-item" onclick="quickMsg('이메일 초안 작성해줘')"><span class="ic">✉️</span> 이메일 작성</div>
                <div class="sb-item" onclick="quickMsg('회의록 요약해줘')"><span class="ic">📄</span> 회의록 요약</div>
            </div>
        </div>

        <div class="sb-footer">
            <div class="user-row">
                <div class="avatar" id="u-avatar">A</div>
                <div class="ur-text">
                    <div class="ur-name" id="u-name">직원</div>
                    <div class="ur-role" id="u-role">일반 직원</div>
                </div>
                <button class="logout-btn" onclick="doLogout()">로그아웃</button>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <span style="font-size:16px">💬</span>
            <h3 id="hdr-title">새 채팅</h3>
            <select class="model-select" id="model-select"></select>
            <span class="header-stat"><span class="header-dot"></span><span id="selected-stat">선택 0</span></span>
            <span class="header-stat"><span class="header-dot" style="background: var(--success)"></span><span id="upload-stat">업로드 0</span></span>
            <button class="hdr-btn theme-btn" id="theme-toggle" onclick="toggleTheme()">🌙 다크</button>
            <button class="hdr-btn" onclick="openModal('sp-modal')">⚙️ 프롬프트</button>
        </div>
        <div class="selection-tray" id="selection-tray">
            <span class="tray-label">비교 범위</span>
            <div class="tray-chips" id="selection-chips"></div>
            <button class="tray-clear" onclick="clearActiveScope()">선택 해제</button>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <div class="scope-banner" id="scope-banner">
                <span class="scope-label">선택 문서</span>
                <span class="scope-text" id="scope-text"></span>
                <button class="banner-close" onclick="clearActiveScope()" title="선택 해제">✕</button>
            </div>
            <div class="file-banner" id="file-banner">
                <span>📎</span>
                <span class="file-text" id="file-text"></span>
                <button class="banner-close" onclick="clearFiles()" title="첨부 제거">✕</button>
            </div>
            <div class="input-box">
                <textarea id="msg-input" rows="1" placeholder="메시지 입력... (파일 업로드는 왼쪽 보관소에서 진행)"></textarea>
                <button class="stop-btn" id="stop-btn" onclick="stopGeneration()" style="display:none">⏹</button>
                <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
            </div>
            <div class="input-hint">AI가 실수할 수 있습니다. 중요한 정보는 반드시 확인하세요.</div>
        </div>
    </div>
</div>

<script>
const API = window.location.origin;
const USERS = JSON.parse(localStorage.getItem('ai_users') || 'null') || {
    'admin': { pw: 'admin123', role: '관리자' },
    'tilon': { pw: 'tilon123', role: '일반 직원' },
    '직원1': { pw: '1234', role: '일반 직원' }
};
const CHAT_KEY = 'ai_chats';
const DOC_KEY = 'ai_uploaded_docs';
const MAX_SHELF_FILES = 90;
const HISTORY_MAX_MESSAGES = 8;

let currentUser = null;
let isLoading = false;
let abortController = null;
let currentModel = null;
let currentTheme = localStorage.getItem('ai_theme') || 'light';
let systemPrompt = localStorage.getItem('ai_sys_prompt') || '당신은 사내 AI 어시스턴트입니다. 한국어로 친절하고 명확하게 답변하세요. 문서 질문은 반드시 제공된 문서 근거로만 답변하세요.';
let chats = normalizeChats(JSON.parse(localStorage.getItem(CHAT_KEY) || '[]'));
let uploadedDocs = normalizeDocs(JSON.parse(localStorage.getItem(DOC_KEY) || '[]'));
let currentChatId = null;
const msgInput = document.getElementById('msg-input');
const fileBanner = document.getElementById('file-banner');
const fileText = document.getElementById('file-text');
const scopeBanner = document.getElementById('scope-banner');
const scopeLabel = scopeBanner ? scopeBanner.querySelector('.scope-label') : null;
const scopeText = document.getElementById('scope-text');
const scopeBannerClose = scopeBanner ? scopeBanner.querySelector('.banner-close') : null;
const shelfSearch = document.getElementById('shelf-search');
const modelSelect = document.getElementById('model-select');
const selectedStat = document.getElementById('selected-stat');
const uploadStat = document.getElementById('upload-stat');
const selectionTray = document.getElementById('selection-tray');
const selectionChips = document.getElementById('selection-chips');
const themeToggle = document.getElementById('theme-toggle');

function applyTheme(theme) {
    currentTheme = theme === 'dark' ? 'dark' : 'light';
    document.body.setAttribute('data-theme', currentTheme);
    localStorage.setItem('ai_theme', currentTheme);
    if (themeToggle) {
        themeToggle.textContent = currentTheme === 'dark' ? '☀️ 라이트' : '🌙 다크';
    }
}

function toggleTheme() {
    applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
}

applyTheme(currentTheme);

function now() {
    return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function esc(text) {
    return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function readApiJson(response) {
    const raw = await response.text();
    if (!raw) return {};
    try {
        return JSON.parse(raw);
    } catch {
        return { detail: raw };
    }
}

function toast(message, duration = 2500) {
    const node = document.getElementById('toast');
    node.textContent = message;
    node.classList.add('show');
    setTimeout(() => node.classList.remove('show'), duration);
}

function formatRelativeTime(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    const diffMs = Date.now() - date.getTime();
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return '방금 전';
    if (diffMin < 60) return `${diffMin}분 전`;
    const diffHour = Math.floor(diffMin / 60);
    if (diffHour < 24) return `${diffHour}시간 전`;
    const diffDay = Math.floor(diffHour / 24);
    if (diffDay < 7) return `${diffDay}일 전`;
    return date.toLocaleDateString('ko-KR');
}

function docKey(doc) {
    if (doc.doc_id) return 'id:' + doc.doc_id;
    return 'src:' + String(doc.source || '').toLowerCase();
}

function normalizeDocs(raw) {
    const list = Array.isArray(raw) ? raw : [];
    const map = new Map();
    list.forEach(item => {
        const doc = {
            source: item.source || item.filename || '',
            doc_id: item.doc_id || '',
            chunk_count: Number(item.chunk_count || item.chunks || item.chunks_stored || 0),
            page_total: item.page_total || '',
            languages: Array.isArray(item.languages) ? item.languages : [],
            updated_at: item.updated_at || item.uploaded_at || Date.now()
        };
        if (!doc.source) return;
        map.set(docKey(doc), doc);
    });
    return Array.from(map.values()).sort((a, b) => String(a.source).localeCompare(String(b.source), 'ko'));
}

function normalizeChats(raw) {
    const list = Array.isArray(raw) ? raw : [];
    return list.map((chat, index) => {
        const activeDocs = Array.isArray(chat.activeDocs)
            ? chat.activeDocs
            : ((chat.activeSource || chat.activeDocId)
                ? [{ source: chat.activeSource || '', docId: chat.activeDocId || '' }]
                : []);
        return {
            id: chat.id || ('c_' + Date.now() + '_' + index),
            title: chat.title || '새 채팅',
            activeDocs: activeDocs.map(doc => ({ source: doc.source || '', docId: doc.docId || doc.doc_id || '' })),
            messages: Array.isArray(chat.messages)
                ? chat.messages.map(message => ({
                    sender: message.sender || (message.isUser ? 'You' : 'AI 어시스턴트'),
                    text: message.text || message.content || '',
                    isUser: !!message.isUser,
                    mode: message.mode || '',
                    fileName: message.fileName || '',
                    sources: Array.isArray(message.sources) ? message.sources : []
                }))
                : []
        };
    });
}

function saveChats() {
    localStorage.setItem(CHAT_KEY, JSON.stringify(chats));
}

function saveDocs() {
    localStorage.setItem(DOC_KEY, JSON.stringify(uploadedDocs));
}

function currentChat() {
    return chats.find(chat => chat.id === currentChatId) || null;
}

function ensureCurrentChat() {
    let chat = currentChat();
    if (!chat) {
        newChat();
        chat = currentChat();
    }
    return chat;
}

function pushChatMessage(message) {
    const chat = ensureCurrentChat();
    chat.messages.push(message);
    saveChats();
}

function buildHistoryForAPI(messages) {
    return (Array.isArray(messages) ? messages : [])
        .slice(-HISTORY_MAX_MESSAGES)
        .map(message => ({
            role: message.isUser ? 'user' : 'assistant',
            content: String(message.text || '').trim()
        }))
        .filter(message => message.content);
}

function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function renderPendingFiles() {
    fileBanner.classList.remove('visible');
    fileText.textContent = '';
}

function clearFiles() {
    renderPendingFiles();
}

function renderScopeBanner() {
    const chat = currentChat();
    const activeDocs = chat ? (chat.activeDocs || []) : [];
    const hasUploads = uploadedDocs.length > 0;
    if (!activeDocs.length) {
        selectedStat.textContent = hasUploads ? '전체 업로드 검색' : '선택 0';
        if (hasUploads) {
            if (scopeLabel) scopeLabel.textContent = '검색 범위';
            scopeText.textContent = '선택된 파일 없음 -> 업로드된 모든 파일에서 검색';
            if (scopeBannerClose) scopeBannerClose.style.display = 'none';
            scopeBanner.classList.add('visible');
        } else {
            scopeBanner.classList.remove('visible');
            scopeText.textContent = '';
            if (scopeBannerClose) scopeBannerClose.style.display = '';
        }
        selectionTray.classList.remove('visible');
        selectionChips.innerHTML = '';
        return;
    }
    selectedStat.textContent = `선택 ${activeDocs.length}`;
    if (scopeLabel) scopeLabel.textContent = '검색 범위';
    if (activeDocs.length === 1) {
        scopeText.textContent = `선택된 파일만 검색: ${activeDocs[0].source || activeDocs[0].docId || '선택 문서'}`;
    } else {
        scopeText.textContent = `${activeDocs.length}개 선택됨 -> 선택한 파일들로만 좁혀서 검색`;
    }
    if (scopeBannerClose) scopeBannerClose.style.display = '';
    scopeBanner.classList.add('visible');
    selectionTray.classList.add('visible');
    selectionChips.innerHTML = activeDocs.map(doc => {
        const label = doc.source || doc.docId || '선택 문서';
        const sourceEscaped = JSON.stringify(doc.source || '');
        const docIdEscaped = JSON.stringify(doc.docId || '');
        return `<div class="tray-chip"><span>${esc(label)}</span><button onclick='toggleActiveDocument(${sourceEscaped}, ${docIdEscaped})'>✕</button></div>`;
    }).join('');
}

function setActiveDocuments(docs) {
    const chat = ensureCurrentChat();
    chat.activeDocs = (docs || [])
        .filter(doc => doc && (doc.source || doc.docId))
        .map(doc => ({ source: doc.source || '', docId: doc.docId || '' }));
    saveChats();
    renderScopeBanner();
    renderShelfDocs();
}

function toggleActiveDocument(source, docId) {
    const chat = ensureCurrentChat();
    const activeDocs = chat.activeDocs || [];
    const exists = activeDocs.some(doc => (doc.docId && doc.docId === docId) || (!doc.docId && doc.source === source));
    if (exists) {
        setActiveDocuments(activeDocs.filter(doc => !((doc.docId && doc.docId === docId) || (!doc.docId && doc.source === source))));
    } else {
        setActiveDocuments(activeDocs.concat([{ source: source || '', docId: docId || '' }]));
    }
}

function clearActiveScope() {
    const chat = currentChat();
    if (!chat || !(chat.activeDocs || []).length) return;
    setActiveDocuments([]);
    toast('선택한 문서 범위를 해제했습니다.');
}

async function doLogin() {
    const id = document.getElementById('li-id').value.trim();
    const pw = document.getElementById('li-pw').value;
    const user = USERS[id];

    if (!(user && user.pw === pw)) {
        document.getElementById('li-err').style.display = 'block';
        document.getElementById('li-pw').value = '';
        return;
    }

    currentUser = { id, role: user.role };
    document.getElementById('li-err').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('sb-user').textContent = id;
    document.getElementById('u-name').textContent = id;
    document.getElementById('u-role').textContent = user.role;
    document.getElementById('u-avatar').textContent = id[0].toUpperCase();

    if (!chats.length) newChat();
    renderChatList();
    loadChat(chats[0].id);
    renderShelfDocs();

    await Promise.all([loadHealth(), syncDocsFromServer()]);
}

function doLogout() {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('li-id').value = '';
    document.getElementById('li-pw').value = '';
}

document.addEventListener('keydown', event => {
    if (event.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
        doLogin();
    }
});

async function loadHealth() {
    try {
        const response = await fetch(API + '/health');
        const data = await readApiJson(response);
        if (data.model) {
            currentModel = data.model;
            if (!modelSelect.value) {
                modelSelect.innerHTML = `<option value="${esc(data.model)}">${esc(data.model)}</option>`;
                modelSelect.value = data.model;
            }
        }
    } catch {}
}

async function loadModels() {
    try {
        const response = await fetch(API + '/models');
        const data = await readApiJson(response);
        const models = Array.isArray(data.available) ? data.available : [];
        modelSelect.innerHTML = '';
        models.forEach(model => {
            const option = document.createElement('option');
            option.value = model;
            option.textContent = model;
            modelSelect.appendChild(option);
        });
        currentModel = localStorage.getItem('tilon_ui_model') || data.default || models[0] || currentModel;
        if (currentModel && models.includes(currentModel)) {
            modelSelect.value = currentModel;
        } else if (data.default) {
            currentModel = data.default;
            modelSelect.value = data.default;
        }
    } catch {
        if (!modelSelect.options.length && currentModel) {
            modelSelect.innerHTML = `<option value="${esc(currentModel)}">${esc(currentModel)}</option>`;
        }
    }
}

function openModal(id) {
    if (id === 'sp-modal') document.getElementById('sp-input').value = systemPrompt;
    document.getElementById(id).classList.add('open');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-bg').forEach(bg => {
    bg.addEventListener('click', event => {
        if (event.target === bg) bg.classList.remove('open');
    });
});

function savePrompt() {
    systemPrompt = document.getElementById('sp-input').value.trim() || systemPrompt;
    localStorage.setItem('ai_sys_prompt', systemPrompt);
    closeModal('sp-modal');
    toast('시스템 프롬프트를 저장했습니다.');
}

function newChat() {
    const id = 'c_' + Date.now();
    chats.unshift({ id, title: '새 채팅', activeDocs: [], messages: [] });
    saveChats();
    renderChatList();
    loadChat(id);
}

function loadChat(id) {
    currentChatId = id;
    const chat = currentChat();
    if (!chat) return;

    document.getElementById('hdr-title').textContent = chat.title;
    document.querySelectorAll('.sb-item[data-id]').forEach(el => {
        el.classList.toggle('active', el.dataset.id === id);
    });

    const messages = document.getElementById('messages');
    messages.innerHTML = '';

    if (!chat.messages.length) {
        messages.innerHTML = `<div class="welcome" id="welcome">
            <img class="wi" src="/static/otter-mascot.png" alt="수달 마스코트">
            <h2>무엇을 도와드릴까요?</h2>
            <p>파일을 업로드하면 보관소에 저장됩니다. 파일을 선택하지 않으면 업로드된 모든 파일에서 검색하고, 하나 이상 선택하면 선택한 파일들로만 범위를 좁혀 답변합니다.</p>
            <div class="quick-btns">
                <button class="qb" onclick="quickMsg('이 문서의 핵심 내용을 요약해줘')">문서 요약</button>
                <button class="qb" onclick="quickMsg('지원 대상은 어떻게 돼?')">정확 질의</button>
                <button class="qb" onclick="quickMsg('이 두 문서의 차이점을 비교해줘')">문서 비교</button>
            </div>
        </div>`;
    } else {
        chat.messages.forEach(message => renderMsg(message, false));
        messages.scrollTop = messages.scrollHeight;
    }

    renderScopeBanner();
    renderShelfDocs();
}

function deleteChat(id, event) {
    event.stopPropagation();
    chats = chats.filter(chat => chat.id !== id);
    saveChats();
    renderChatList();
    if (currentChatId === id) {
        if (chats.length) loadChat(chats[0].id);
        else newChat();
    }
}

function renderChatList() {
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    chats.forEach(chat => {
        const item = document.createElement('div');
        item.className = 'sb-item' + (chat.id === currentChatId ? ' active' : '');
        item.dataset.id = chat.id;
        item.innerHTML = `<span class="ic">💬</span><span class="chat-name">${esc(chat.title)}</span><button class="del-btn" onclick="deleteChat('${chat.id}',event)">✕</button>`;
        item.onclick = event => {
            if (!event.target.classList.contains('del-btn')) loadChat(chat.id);
        };
        list.appendChild(item);
    });
}

function filterChats(keyword) {
    const query = String(keyword || '').toLowerCase();
    document.querySelectorAll('.sb-item[data-id]').forEach(el => {
        const name = el.querySelector('.chat-name').textContent.toLowerCase();
        el.style.display = (!query || name.includes(query)) ? '' : 'none';
    });
}

function quickMsg(text) {
    msgInput.value = text;
    msgInput.focus();
}

function upsertDoc(doc) {
    if (!doc || !doc.source) return;
    const map = new Map(uploadedDocs.map(item => [docKey(item), item]));
    const previous = map.get(docKey(doc)) || {};
    map.set(docKey(doc), {
        source: doc.source,
        doc_id: doc.doc_id || previous.doc_id || '',
        chunk_count: Number(doc.chunk_count || doc.chunks || previous.chunk_count || 0),
        page_total: doc.page_total || previous.page_total || '',
        languages: doc.languages || previous.languages || [],
        updated_at: doc.updated_at || previous.updated_at || Date.now()
    });
    uploadedDocs = Array.from(map.values()).sort((a, b) => String(a.source).localeCompare(String(b.source), 'ko'));
    saveDocs();
}

function renderShelfDocs() {
    const list = document.getElementById('shelf-list');
    const chat = currentChat();
    const activeDocs = chat ? (chat.activeDocs || []) : [];
    const query = String(shelfSearch.value || '').trim().toLowerCase();
    uploadStat.textContent = `업로드 ${uploadedDocs.length}`;
    const visibleDocs = uploadedDocs.filter(doc => !query || String(doc.source || '').toLowerCase().includes(query));

    if (!uploadedDocs.length) {
        list.innerHTML = '<div class="shelf-empty">업로드된 파일이 없습니다.</div>';
        return;
    }

    if (!visibleDocs.length) {
        list.innerHTML = '<div class="shelf-empty">검색 결과가 없습니다.</div>';
        return;
    }

    list.innerHTML = '';
    visibleDocs.forEach(doc => {
        const selected = activeDocs.some(active => active.docId === doc.doc_id || (!active.docId && active.source === doc.source));
        const row = document.createElement('div');
        row.className = 'shelf-item' + (selected ? ' active' : '');

        const top = document.createElement('div');
        top.className = 'shelf-item-top';

        const nameBtn = document.createElement('button');
        nameBtn.type = 'button';
        nameBtn.className = 'shelf-item-name' + (selected ? ' active' : '');
        nameBtn.textContent = doc.source;
        nameBtn.title = selected ? '클릭해서 비교 선택에서 해제' : '클릭해서 문서 선택';
        nameBtn.onclick = () => selectShelfDoc(doc);

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'shelf-del-btn';
        delBtn.textContent = '삭제';
        delBtn.onclick = event => {
            event.stopPropagation();
            deleteShelfDoc(doc);
        };

        const meta = document.createElement('div');
        meta.className = 'shelf-item-meta';
        const metaParts = [];
        if (doc.chunk_count) metaParts.push(`${doc.chunk_count} chunks`);
        if (doc.page_total) metaParts.push(`${doc.page_total}p`);
        if (Array.isArray(doc.languages) && doc.languages.length) metaParts.push(doc.languages.join('/'));
        meta.textContent = metaParts.join(' • ') || '업로드 문서';

        const time = document.createElement('div');
        time.className = 'shelf-item-time';
        time.textContent = doc.updated_at ? `최근 업데이트 ${formatRelativeTime(doc.updated_at)}` : '';

        top.appendChild(nameBtn);
        top.appendChild(delBtn);
        row.appendChild(top);
        row.appendChild(meta);
        if (selected) {
            const badge = document.createElement('div');
            badge.className = 'shelf-badge';
            badge.textContent = activeDocs.length > 1 ? '비교에 포함됨' : '현재 선택됨';
            row.appendChild(badge);
        }
        if (time.textContent) row.appendChild(time);
        list.appendChild(row);
    });
}

function selectShelfDoc(doc) {
    const chat = ensureCurrentChat();
    const activeDocs = chat.activeDocs || [];
    const exists = activeDocs.some(active => active.docId === doc.doc_id || (!active.docId && active.source === doc.source));
    toggleActiveDocument(doc.source || '', doc.doc_id || '');
    const nextCount = (currentChat().activeDocs || []).length;
    if (exists) {
        toast(nextCount ? `비교 선택에서 제거됨: ${doc.source}` : '문서 선택을 모두 해제했습니다.');
    } else if (nextCount > 1) {
        toast(`비교용으로 ${nextCount}개 문서를 선택했습니다.`);
    } else {
        toast(`문서 선택됨: ${doc.source}`);
    }
}

async function deleteShelfDoc(doc) {
    if (!doc || !doc.source) return;
    if (!confirm(`"${doc.source}" 파일을 삭제할까요?`)) return;

    try {
        const query = new URLSearchParams();
        query.set('source', doc.source);
        if (doc.doc_id) query.set('doc_id', doc.doc_id);

        const response = await fetch(API + '/upload-document?' + query.toString(), { method: 'DELETE' });
        const data = await readApiJson(response);
        if (!response.ok) throw new Error(data.detail || '삭제 실패');

        uploadedDocs = uploadedDocs.filter(item => docKey(item) !== docKey(doc));
        chats.forEach(chat => {
            chat.activeDocs = (chat.activeDocs || []).filter(active => !(active.docId === doc.doc_id || (!active.docId && active.source === doc.source)));
        });
        saveDocs();
        saveChats();
        renderShelfDocs();
        renderScopeBanner();
        await syncDocsFromServer();
        toast(data.message || '업로드 파일을 삭제했습니다.');
    } catch (error) {
        toast('파일 삭제 실패: ' + error.message);
    }
}

async function syncDocsFromServer() {
    try {
        const response = await fetch(API + '/uploaded-docs');
        const data = await readApiJson(response);
        uploadedDocs = normalizeDocs(data.documents || []);
        saveDocs();
        renderShelfDocs();
    } catch {
        renderShelfDocs();
    }
}

function openShelfUpload() {
    document.getElementById('shelf-file').click();
}

async function uploadToShelf(input) {
    let files = Array.from((input && input.files) || []);
    input.value = '';
    if (!files.length) return;

    if (files.length > MAX_SHELF_FILES) {
        files = files.slice(0, MAX_SHELF_FILES);
        toast(`한 번에 최대 ${MAX_SHELF_FILES}개까지 업로드할 수 있습니다.`);
    }

    const button = document.getElementById('shelf-upload-btn');
    button.disabled = true;
    button.textContent = `⏳ 업로드 중... (${files.length})`;

    try {
        const formData = new FormData();
        files.forEach(file => formData.append('files', file));
        const response = await fetch(API + '/upload-multiple', { method: 'POST', body: formData });
        const data = await readApiJson(response);
        if (!response.ok) throw new Error(data.detail || '업로드 실패');

        const successes = (data.results || []).filter(item => item.status === 'success');
        const failures = (data.results || []).filter(item => item.status !== 'success');
        successes.forEach(item => upsertDoc({
            source: item.file,
            doc_id: item.doc_id || '',
            chunk_count: item.chunks || 0,
            updated_at: Date.now()
        }));
        await syncDocsFromServer();

        if (successes.length) toast(`업로드 완료: ${successes.length}개 파일`);
        if (failures.length) toast(`업로드 실패/건너뜀: ${failures.length}개 파일`);
    } catch (error) {
        toast('업로드 실패: ' + error.message);
    } finally {
        button.disabled = false;
        button.textContent = '📎 파일 업로드';
    }
}

function stopGeneration() {
    if (abortController) {
        abortController.abort();
        abortController = null;
    }
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('stop-btn').style.display = 'none';
    toast('응답 생성을 중지했습니다.');
}

async function sendChatRequest(text, history, docScope) {
    const payload = {
        message: text,
        system_prompt: systemPrompt,
        history,
        model: currentModel || undefined,
        active_source: docScope.singleSource || null,
        active_doc_id: docScope.singleDocId || null,
        active_source_type: docScope.sourceType || null,
        active_sources: docScope.sources,
        active_doc_ids: docScope.docIds
    };
    const response = await fetch(API + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: abortController.signal,
        body: JSON.stringify(payload)
    });
    return { response, data: await readApiJson(response) };
}

async function sendMsg() {
    if (isLoading) return;
    const text = msgInput.value.trim();
    const files = [];
    if (!text && !files.length) return;

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = ensureCurrentChat();
    const displayText = text || (files.length === 1 ? '이 문서를 분석해줘' : `${files.length}개 문서를 업로드합니다`);

    if (chat.title === '새 채팅') {
        chat.title = displayText.length > 20 ? displayText.slice(0, 20) + '…' : displayText;
        document.getElementById('hdr-title').textContent = chat.title;
        renderChatList();
    }

    const userMessage = {
        sender: currentUser ? currentUser.id : 'You',
        text: displayText,
        isUser: true,
        mode: '',
        fileName: files.length === 1 ? files[0].name : (files.length > 1 ? `${files.length}개 파일 첨부` : ''),
        sources: []
    };
    pushChatMessage(userMessage);
    renderMsg(userMessage, true);

    msgInput.value = '';
    msgInput.style.height = 'auto';
    clearFiles();

    const typingId = showTyping();
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('stop-btn').style.display = 'flex';
    abortController = new AbortController();

    try {
        let result = null;

        if (files.length === 1) {
            const formData = new FormData();
            formData.append('file', files[0]);
            formData.append('message', displayText);
            if (currentModel) formData.append('model', currentModel);

            const response = await fetch(API + '/chat-with-file', {
                method: 'POST',
                body: formData,
                signal: abortController.signal
            });
            const data = await readApiJson(response);
            if (!response.ok) throw new Error(data.detail || '문서 업로드 실패');

            const responseDocs = (data.active_doc_ids || []).map((docId, index) => ({
                source: (data.active_sources || [])[index] || data.active_source || files[0].name,
                docId: docId || ''
            })).filter(doc => doc.source || doc.docId);

            if (responseDocs.length) {
                setActiveDocuments(responseDocs);
            } else {
                setActiveDocuments([{ source: data.active_source || files[0].name, docId: data.active_doc_id || '' }]);
            }

            if (data.ingest && data.ingest.count > 0) {
                upsertDoc({
                    source: data.active_source || files[0].name,
                    doc_id: data.active_doc_id || '',
                    chunk_count: data.ingest.count,
                    updated_at: Date.now()
                });
            }

            await syncDocsFromServer();
            result = data;
        } else if (files.length > 1) {
            const formData = new FormData();
            files.forEach(file => formData.append('files', file));

            const response = await fetch(API + '/upload-multiple', {
                method: 'POST',
                body: formData,
                signal: abortController.signal
            });
            const data = await readApiJson(response);
            if (!response.ok) throw new Error(data.detail || '다중 업로드 실패');

            const successes = (data.results || [])
                .filter(item => item.status === 'success')
                .map(item => ({ source: item.file || '', docId: item.doc_id || '' }))
                .filter(doc => doc.source || doc.docId);

            successes.forEach(doc => upsertDoc({
                source: doc.source,
                doc_id: doc.docId,
                updated_at: Date.now()
            }));
            await syncDocsFromServer();
            setActiveDocuments(successes);

            if (!text) {
                result = {
                    answer: `${successes.length}개 문서가 업로드되었습니다. 왼쪽 보관소에서 선택 상태를 확인한 뒤 질문해 보세요.`,
                    sources: [],
                    mode: successes.length > 1 ? 'document_compare' : 'document_qa',
                    active_sources: successes.map(doc => doc.source),
                    active_doc_ids: successes.map(doc => doc.docId)
                };
            } else if (successes.length) {
                const docScope = {
                    singleSource: successes.length === 1 ? successes[0].source : '',
                    singleDocId: successes.length === 1 ? successes[0].docId : '',
                    sources: successes.map(doc => doc.source).filter(Boolean),
                    docIds: successes.map(doc => doc.docId).filter(Boolean)
                };
                const followup = await sendChatRequest(text, buildHistoryForAPI(currentChat().messages.slice(0, -1)), docScope);
                if (!followup.response.ok) throw new Error(followup.data.detail || '질문 처리 실패');
                result = followup.data;
            } else {
                result = {
                    answer: '업로드에 성공한 문서가 없어 답변을 생성하지 못했습니다.',
                    sources: [],
                    mode: 'general'
                };
            }
        } else {
            const activeDocs = chat.activeDocs || [];
            const docScope = {
                singleSource: activeDocs.length === 1 ? (activeDocs[0].source || '') : '',
                singleDocId: activeDocs.length === 1 ? (activeDocs[0].docId || '') : '',
                sourceType: !activeDocs.length && uploadedDocs.length ? 'upload' : '',
                sources: activeDocs.map(doc => doc.source).filter(Boolean),
                docIds: activeDocs.map(doc => doc.docId).filter(Boolean)
            };
            const reply = await sendChatRequest(text, buildHistoryForAPI(chat.messages.slice(0, -1)), docScope);
            if (!reply.response.ok) throw new Error(reply.data.detail || '답변 생성 실패');
            result = reply.data;
        }

        removeTyping(typingId);

        const responseDocs = (result.active_doc_ids || []).map((docId, index) => ({
            source: (result.active_sources || [])[index] || '',
            docId: docId || ''
        })).filter(doc => doc.source || doc.docId);
        if (responseDocs.length) {
            setActiveDocuments(responseDocs);
        } else if (result.active_source || result.active_doc_id) {
            setActiveDocuments([{ source: result.active_source || '', docId: result.active_doc_id || '' }]);
        }

        const assistantMessage = {
            sender: 'AI 어시스턴트',
            text: result.answer || '응답이 비어 있습니다.',
            isUser: false,
            mode: result.mode || '',
            fileName: '',
            sources: Array.isArray(result.sources) ? result.sources : []
        };
        pushChatMessage(assistantMessage);
        renderMsg(assistantMessage, true);
    } catch (error) {
        removeTyping(typingId);
        const failedMessage = {
            sender: 'AI 어시스턴트',
            text: error.name === 'AbortError' ? '응답 생성을 중지했습니다.' : ('오류가 발생했습니다: ' + error.message),
            isUser: false,
            mode: 'system',
            fileName: '',
            sources: []
        };
        pushChatMessage(failedMessage);
        renderMsg(failedMessage, true);
    } finally {
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('stop-btn').style.display = 'none';
        abortController = null;
        msgInput.focus();
    }
}

function renderMsg(message, scroll) {
    const messages = document.getElementById('messages');
    const group = document.createElement('div');
    group.className = 'msg-group';

    const modeHtml = message.mode ? `<span class="mode-pill">${esc(message.mode)}</span>` : '';
    const fileHtml = message.fileName ? `<div class="msg-file">📎 ${esc(message.fileName)}</div>` : '';
    const sourceHtml = modeHtml ? `<div class="msg-foot">${modeHtml}</div>` : '';

    group.innerHTML = `
        <div class="msg-meta">
            <span class="msg-sender ${message.isUser ? '' : 'ai'}">${message.isUser ? esc(message.sender) : '🤖 ' + esc(message.sender)}</span>
            <span class="msg-time">${now()}</span>
            <button class="copy-btn" onclick="copyMsg(this)">복사</button>
        </div>
        ${fileHtml}
        <div class="msg-text ${message.isUser ? 'user' : ''}">${esc(message.text)}</div>
        ${sourceHtml}`;
    messages.appendChild(group);
    if (scroll) messages.scrollTop = messages.scrollHeight;
}

function copyMsg(button) {
    const text = button.closest('.msg-group').querySelector('.msg-text').innerText;
    navigator.clipboard.writeText(text).then(() => {
        button.textContent = '✅';
        setTimeout(() => { button.textContent = '복사'; }, 1200);
    });
}

function showTyping() {
    const messages = document.getElementById('messages');
    const id = 'tp' + Date.now();
    const node = document.createElement('div');
    node.id = id;
    node.className = 'typing';
    node.innerHTML = `<span style="color:var(--accent);font-size:13px">🤖 AI 어시스턴트</span><div class="dots"><span></span><span></span><span></span></div>`;
    messages.appendChild(node);
    messages.scrollTop = messages.scrollHeight;
    return id;
}

function removeTyping(id) {
    const node = document.getElementById(id);
    if (node) node.remove();
}

modelSelect.addEventListener('change', () => {
    currentModel = modelSelect.value || currentModel;
    localStorage.setItem('tilon_ui_model', currentModel || '');
});

shelfSearch.addEventListener('input', () => {
    renderShelfDocs();
});

msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

msgInput.addEventListener('keydown', event => {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMsg();
    }
});

loadModels();
renderShelfDocs();
setInterval(loadHealth, 30000);
</script>
